    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #050816;
            --card: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.12);
            --text: #ffffff;
            --secondary: rgba(255,255,255,0.72);
            --accent: #3b82f6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(99,102,241,0.18), transparent 24%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        .container {
            width: min(1180px, 92%);
            margin: 0 auto;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 0;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 700;
            font-size: 1.05rem;
        }
        .brand img {
            width: 42px;
            height: 42px;
            border-radius: 12px;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            color: var(--secondary);
            font-size: 0.95rem;
        }
        .hero {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 80px;
            align-items: center;
            padding: 80px 0 120px;
        }
        .hero-text h1 {
            font-size: clamp(3rem, 7vw, 5.6rem);
            line-height: 0.95;
            letter-spacing: -0.06em;
            margin-bottom: 28px;
        }
        .hero-text p {
            color: var(--secondary);
            font-size: 1.2rem;
            max-width: 580px;
            margin-bottom: 38px;
        }
        .buttons {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }
        .button-primary,
        .button-secondary {
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.25s ease;
        }
        .button-primary {
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            color: white;
            box-shadow: 0 10px 30px rgba(59,130,246,0.35);
        }
        .button-primary:hover {
            transform: translateY(-2px);
        }
        .button-secondary {
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            color: white;
        }

            position: relative;
            display: flex;
            justify-content: center;
        }

            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.45);
