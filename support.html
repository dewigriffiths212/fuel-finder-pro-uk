<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Finder Pro UK Support</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px 20px;
            color: #1d1d1f;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #007AFF;
            font-size: 32px;
        }

        p {
            line-height: 1.7;
            margin-bottom: 18px;
        }

        .email-box {
            background: #f2f4f7;
            padding: 18px;
            border-radius: 16px;
            margin: 24px 0;
        }

        a {
            color: #007AFF;
            text-decoration: none;
            font-weight: 600;
        }

        .footer {
            margin-top: 32px;
            font-size: 14px;
            color: #6e6e73;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Fuel Finder Pro UK Support</h1>

            <p>
                Need help, found a bug, or have feedback about Fuel Finder Pro UK?
            </p>

            <p>
                We’re always working to improve the app and appreciate all feedback from UK drivers.
            </p>

            <div class="email-box">
                <strong>Support Email</strong><br><br>

                <a href="mailto:YOUR_EMAIL_HERE">
                    YOUR_EMAIL_HERE
                </a>
            </div>

            <p>
                We aim to respond within 48 hours.
            </p>

            <div class="footer">
                Fuel Finder Pro UK
            </div>

        </div>

    </div>

</body>
</html>
